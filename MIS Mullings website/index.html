<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>This is a example</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{
--primary:#FF69B4; 
--accent:#FFB6C1;
--bg:#330022;
--card:rgba(255,255,255,0.05);
--border:rgba(255,255,255,0.12);
}
body{margin:0;font-family:'Inter',sans-serif;background:var(--bg);color:white;overflow-x:hidden;transition:0.5s;}
nav{position:fixed;top:0;width:100%;display:flex;justify-content:flex-start;align-items:center;padding:20px 50px;background:rgba(0,0,0,0.5);backdrop-filter:blur(15px);border-bottom:1px solid var(--border);z-index:1000;gap:50px;}
nav h1{font-weight:800;background:linear-gradient(45deg,var(--primary),var(--accent));-webkit-background-clip:text;color:transparent;font-size:24px;}
.tabs{display:flex;gap:20px;}
.tabs button{padding:10px 18px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:white;cursor:pointer;transition:0.3s;}
.tabs button.active,.tabs button:hover{background:linear-gradient(45deg,var(--primary),var(--accent));transform:translateY(-2px);}
.page{position:absolute;top:110px;width:100%;padding:60px;opacity:0;transform:translateY(30px);filter:blur(6px);transition:all 0.5s ease;pointer-events:none;}
.page.active{opacity:1;transform:translateY(0);filter:blur(0);pointer-events:auto;}
.home-message{margin-top:20px;font-size:18px;opacity:0.85;line-height:1.5;transition:0.5s;}
#changePopup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.7);background:var(--card);padding:30px;border-radius:20px;opacity:0;pointer-events:none;text-align:center;backdrop-filter:blur(15px);transition:all 0.4s ease;z-index:1001;}
#changePopup.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
#welcomePopup{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:black;padding:12px 25px;border-radius:12px;font-size:14px;opacity:0;color:white;pointer-events:none;transition:all 0.5s ease;z-index:1002;}
#backgroundCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:25px;margin-top:40px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;backdrop-filter:blur(15px);transition:0.3s;}
.card:hover{transform:translateY(-6px);box-shadow:0 15px 35px rgba(0,0,0,0.5);}
.card img{width:100%;border-radius:12px;margin-bottom:15px;}
.price-row{display:flex;justify-content:space-between;margin:10px 0;font-weight:600;}
.status.in{color:#00ff88;}
.status.low{color:#ffcc00;}
.status.out{color:#ff4d4d;}
.buy-btn{width:100%;padding:12px;border:none;border-radius:14px;font-weight:700;cursor:pointer;color:white;background:linear-gradient(45deg,var(--primary),var(--accent));transition:0.3s;}
.buy-btn:hover{transform:translateY(-4px);box-shadow:0 10px 30px rgba(0,229,255,0.4);}
.buy-btn:disabled{background:#444;cursor:not-allowed;}
.settings-box{max-width:700px;margin-top:40px;background:var(--card);padding:40px;border-radius:25px;border:1px solid var(--border);backdrop-filter:blur(20px);}
.setting-item{display:flex;justify-content:space-between;align-items:center;padding:18px;border-radius:15px;margin-top:20px;background:rgba(255,255,255,0.03);border:1px solid var(--border);}
.setting-item button{padding:10px 18px;border:none;border-radius:10px;cursor:pointer;font-weight:600;transition:0.3s;}
.cashapp-btn{background:#00C244;color:white;}
.stripe-btn{background:#635BFF;color:white;}
.setting-item button:hover{transform:translateY(-3px);}
select{padding:10px 14px;border-radius:10px;border:none;background:black;color:white;font-weight:600;cursor:pointer;}
.home-footer{margin-top:40px;text-align:center;font-size:12px;opacity:0.6;}
footer{position:fixed;bottom:10px;width:100%;text-align:center;opacity:0.4;}
</style>
</head>
<body>

<canvas id="backgroundCanvas"></canvas>

<nav>
<h1>This is a example</h1>
<div class="tabs">
<button class="active" data-key="home">Home</button>
<button data-key="store">Store</button>
<button data-key="inventory">Inventory</button>
<button data-key="stats">Stats</button>
<button data-key="settings">Settings</button>
</div>
</nav>

<!-- Home Page -->
<section id="home" class="page active">
<h2>Welcome to BearLux™</h2>
<p class="home-message" id="homeMessage"></p>
<div class="home-footer">© Andre</div>
</section>

<!-- Store Page -->
<section id="store" class="page">
<h2>Store</h2>
<div class="grid" id="storeGrid"></div>
</section>

<!-- Inventory Page -->
<section id="inventory" class="page">
<h2>Inventory</h2>
<div class="grid" id="inventoryGrid"></div>
</section>

<!-- Stats Page -->
<section id="stats" class="page">
<h2>Stats</h2>
<div class="grid">
<div class="card"><h3>Customers</h3><p id="users">0</p></div>
<div class="card"><h3>Total Sales</h3><p>$12,450</p></div>
</div>
</section>

<!-- Settings Page -->
<section id="settings" class="page">
<h2>Settings</h2>
<div class="settings-box">

<div class="setting-item">
<div><h3>Pay with Stripe</h3><p style="opacity:0.6;">Secure card payments</p></div>
<button class="stripe-btn" onclick="payStripe()">Open</button>
</div>

<div class="setting-item">
<div><h3>Pay with Cash App</h3><p style="opacity:0.6;">Direct Cash App payment</p></div>
<button class="cashapp-btn" onclick="payCashApp()">Open</button>
</div>

<div class="setting-item">
<div><h3>Language</h3><p style="opacity:0.6;">Select preferred language</p></div>
<select id="languageSelect" onchange="changeLanguagePopup()">
<option value="en">English</option>
<option value="es">Spanish</option>
<option value="fr">French</option>
</select>
</div>

<div class="setting-item">
<div><h3>Theme</h3><p style="opacity:0.6;">Select a theme</p></div>
<select id="themeSelect" onchange="changeThemePopup()">
<option value="pinkBlush">Pink Blush</option>
<option value="sunOrange">Sun Orange</option>
<option value="sunnyBlue">Sunny Blue</option>
<option value="forestGreen">Forest Green</option>
<option value="nightSky">Night Sky</option>
<option value="golden">Golden Glow</option>
<option value="icyBlue">Icy Blue</option>
<option value="redFire">Red Fire</option>
</select>
</div>

</div>
</section>

<div id="changePopup"></div>
<div id="welcomePopup"></div>
<footer>© 2026 BearLux™</footer>

<script>
// ---------------- TABS ----------------
const tabs=document.querySelectorAll(".tabs button");
tabs.forEach(btn=>{btn.addEventListener("click",()=>switchTab(btn.dataset.key,btn));});
function switchTab(tab,btn){
  tabs.forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
}

// ---------------- PAYMENTS ----------------
function payStripe(){window.open("https://buy.stripe.com/YOUR_REAL_LINK_HERE","_blank");}
function payCashApp(){window.open("https://cash.app/pay/link/rhg1506c","_blank");}

// ---------------- COUNTER ----------------
function animateCounter(target,finalValue,duration){
  let start=0;
  let step=Math.ceil(finalValue/(duration/30));
  let interval=setInterval(()=>{
    start+=step;
    if(start>=finalValue){start=finalValue;clearInterval(interval);}
    document.getElementById(target).textContent=start;
  },30);
}
animateCounter("users",5000,3000);

// ---------------- WELCOME MESSAGES ----------------
const texts={
en:{homeTabs:["Home","Store","Inventory","Stats","Settings"],
welcome:["Welcome to BearLux™, your premium marketplace for bear collectibles! Made with love ❤️.","Dive into BearLux™, fun and joy, crafted with care.","Step into BearLux™, where every bear is made with love.","Discover BearLux™, surprises await, crafted with love.","Enjoy BearLux™! Colorful and lively, made with love.","Every corner is made with love 💖 for your delight."]},
es:{homeTabs:["Inicio","Tienda","Inventario","Estadísticas","Ajustes"],
welcome:["¡Bienvenido a BearLux™, el mercado de osos! Hecho con amor ❤️.","Descubre BearLux™, diversión y alegría, hecho con cuidado.","Sumérgete en BearLux™, cada artículo hecho con amor.","Descubre BearLux™, sorpresas y tesoros, hechos con amor.","¡Disfruta BearLux™! Colorido y hecho con amor.","Cada rincón de BearLux™ hecho con amor 💖 para tu deleite."]},
fr:{homeTabs:["Accueil","Magasin","Inventaire","Stats","Paramètres"],
welcome:["Bienvenue sur BearLux™, marché premium! Fait avec amour ❤️.","Plongez dans BearLux™, un monde joyeux, conçu avec soin.","Entrez dans BearLux™, chaque article est fait avec amour.","Découvrez BearLux™, surprises et trésors faits avec amour.","Profitez de BearLux™! Coloré et fait avec amour.","Chaque coin de BearLux™ est fait avec amour 💖 pour votre plaisir."]}
};

function getRandomWelcome(lang){let w=texts[lang]?.welcome||texts["en"].welcome; return w[Math.floor(Math.random()*w.length)];}

function changeLanguagePopup(){
  let lang=document.getElementById("languageSelect").value;
  const t=texts[lang].homeTabs;
  tabs.forEach((b,i)=>{b.textContent=t[i];});
  document.getElementById("homeMessage").textContent=getRandomWelcome(lang);
  showPopup("Language changed!");
}

// ---------------- THEMES ----------------
const themes={
pinkBlush:{primary:"#FF69B4",accent:"#FFB6C1",bg:"#330022"},
sunOrange:{primary:"#FF7F50",accent:"#FFD700",bg:"#FF4500"},
sunnyBlue:{primary:"#00CFFF",accent:"#1E90FF",bg:"#001f3f"},
forestGreen:{primary:"#32CD32",accent:"#228B22",bg:"#002200"},
nightSky:{primary:"#8A2BE2",accent:"#4B0082",bg:"#0B0033"},
golden:{primary:"#FFD700",accent:"#FFA500",bg:"#332200"},
icyBlue:{primary:"#00FFFF",accent:"#1E90FF",bg:"#001122"},
redFire:{primary:"#FF4500",accent:"#FF6347",bg:"#330000"}
};

function changeThemePopup(){
  let t=document.getElementById("themeSelect").value;
  document.documentElement.style.setProperty("--primary",themes[t].primary);
  document.documentElement.style.setProperty("--accent",themes[t].accent);
  document.documentElement.style.setProperty("--bg",themes[t].bg);
  showPopup("Theme changed!");
}

// ---------------- POPUPS ----------------
const popup=document.getElementById("changePopup");
function showPopup(message){popup.textContent=message;popup.classList.add("show");setTimeout(()=>{popup.classList.remove("show");},1500);}
function showWelcome(message){
  const w=document.getElementById("welcomePopup");
  w.textContent=message;
  w.style.opacity="1";
  setTimeout(()=>{w.style.opacity="0";},3000);
}

// ---------------- PRODUCTS ----------------
function generateProducts(target,count){
const grid=document.getElementById(target);grid.innerHTML="";
for(let i=1;i<=count;i++){
let stock=Math.floor(Math.random()*6);let status="In Stock",statusClass="in",disabled="";
if(stock===0){status="Sold Out";statusClass="out";disabled="disabled";}
else if(stock<=2){status="Low Stock";statusClass="low";}
grid.innerHTML+=`<div class="card"><img src="https://picsum.photos/400?random=${Math.random()}"><h3>Bear Item ${i}</h3><div class="price-row"><span>$${15+i}</span><span class="status ${statusClass}">${status}</span></div><button class="buy-btn" ${disabled} onclick="payStripe()">${disabled?"Unavailable":"Buy Now"}</button></div>`;
}}
generateProducts("storeGrid",6);
generateProducts("inventoryGrid",12);

// ---------------- BACKGROUND ----------------
const canvas=document.getElementById("backgroundCanvas");const ctx=canvas.getContext("2d");let w=canvas.width=window.innerWidth;let h=canvas.height=window.innerHeight;let circles=[];
for(let i=0;i<150;i++){circles.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*3+1,dx:0,dy:0,color:`rgba(${Math.random()*255},${Math.random()*255},255,0.07)`});}
window.addEventListener("resize",()=>{w=canvas.width=window.innerWidth;h=canvas.height=window.innerHeight;});
window.addEventListener("mousemove",(e)=>{let mx=e.clientX;let my=e.clientY;circles.forEach(c=>{c.dx=(mx-w/2)/150;c.dy=(my-h/2)/150;});});
function animate(){ctx.clearRect(0,0,w,h);circles.forEach(c=>{c.x+=c.dx;c.y+=c.dy;ctx.beginPath();ctx.arc(c.x,c.y,c.r,0,Math.PI*2);ctx.fillStyle=c.color;ctx.fill();});requestAnimationFrame(animate);}
animate();

// ---------------- INIT ----------------
document.getElementById("homeMessage").textContent=getRandomWelcome("en");
showWelcome("Welcome to BearLux™!");
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Login - Example Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin:0;
      font-family:Arial,sans-serif;
      transition:0.5s;
      opacity:0;
      background:linear-gradient(135deg,#0f172a,#1e293b);
      color:white;
    }
    .center {
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }
    .card {
      background:rgba(255,255,255,0.05);
      padding:30px;
      border-radius:15px;
      width:320px;
      text-align:center;
      backdrop-filter:blur(10px);
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
      position:relative;
    }
    input {
      padding:10px;
      width:100%;
      border-radius:8px;
      border:none;
      margin-bottom:10px;
      transition:0.3s;
    }
    button {
      padding:10px 18px;
      border-radius:8px;
      border:none;
      cursor:pointer;
      font-weight:bold;
      margin-top:5px;
    }
    .shake {
      animation: shake 0.3s;
    }
    .error {
      border:2px solid red !important;
    }
    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      50% { transform: translateX(10px); }
      75% { transform: translateX(-10px); }
      100% { transform: translateX(0); }
    }
    .guest-btn {
      position:absolute;
      top:10px;
      left:10px;
      padding:6px 12px;
      font-size:14px;
      background:#22c55e;
      color:white;
      border-radius:6px;
      border:none;
      cursor:pointer;
    }
    .hidden { display:none; }
    .switch-link { color:#22c55e; cursor:pointer; text-decoration:underline; font-size:14px; margin-top:10px; display:block; }
  </style>
</head>
<body>
<div class="center">
  <div class="card">
    <!-- Guest Mode -->
    <button class="guest-btn" onclick="activateGuest()">Guest Mode</button>

    <!-- Login Form (shown first) -->
    <div id="loginForm">
      <h2>Login</h2>
      <input type="text" placeholder="Email or Phone" id="loginEmail">
      <input type="password" placeholder="Password" id="loginPassword">
      <button onclick="completeLogin()">Login</button>
      <span class="switch-link" onclick="showRegister()">Don't have an account? Register</span>
    </div>

    <!-- Register Form (hidden initially) -->
    <div id="registerForm" class="hidden">
      <h2>Register</h2>
      <input type="text" placeholder="Email or Phone" id="regEmail">
      <input type="password" placeholder="Password" id="regPassword">
      <input type="password" placeholder="Confirm Password" id="regConfirm">
      <button onclick="completeRegister()">Register</button>
      <span class="switch-link" onclick="showLogin()">Already have an account? Login</span>
    </div>
  </div>
</div>

<script>
window.addEventListener('load', ()=>{ document.body.style.opacity = 1; });

// Toggle to register form
function showRegister() {
  document.getElementById("loginForm").classList.add("hidden");
  document.getElementById("registerForm").classList.remove("hidden");
}

// Toggle back to login form
function showLogin() {
  document.getElementById("registerForm").classList.add("hidden");
  document.getElementById("loginForm").classList.remove("hidden");
}

// Complete registration
function completeRegister() {
  const pass = document.getElementById("regPassword").value;
  const confirmPass = document.getElementById("regConfirm").value;
  if(pass !== confirmPass || pass==="") {
    const card = document.querySelector(".card");
    card.classList.add("shake");
    document.getElementById("regPassword").classList.add("error");
    document.getElementById("regConfirm").classList.add("error");
    setTimeout(()=>{
      card.classList.remove("shake");
      document.getElementById("regPassword").classList.remove("error");
      document.getElementById("regConfirm").classList.remove("error");
    },1500);
    return;
  }
  document.body.style.transition="opacity 0.5s";
  document.body.style.opacity=0;
  setTimeout(()=>{ window.location.href="index.html"; },500);
}

// Complete login
function completeLogin() {
  // Example validation, you can replace with real logic
  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;
  if(email === "" || password === "") {
    const card = document.querySelector(".card");
    card.classList.add("shake");
    document.getElementById("loginEmail").classList.add("error");
    document.getElementById("loginPassword").classList.add("error");
    setTimeout(()=>{
      card.classList.remove("shake");
      document.getElementById("loginEmail").classList.remove("error");
      document.getElementById("loginPassword").classList.remove("error");
    },1500);
    return;
  }
  document.body.style.transition="opacity 0.5s";
  document.body.style.opacity=0;
  setTimeout(()=>{ window.location.href="index.html"; },500);
}

// Guest Mode
function activateGuest() {
  window.location.href="index.html?guest=true";
}
</script>
</body>
</html>
